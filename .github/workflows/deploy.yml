name: Deploy CaseSim to GitHub Pages

# Builds the site (fetches fresh case data + current Skinport prices, compiles
# Tailwind) and publishes the public/ folder to GitHub Pages on every push to main.

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a manual rebuild from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build (fetch real data + prices, compile CSS)
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
